name: Run Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest maturin

    - name: Build and install Rust extension
      run: |
        maturin build --release --out dist
        pip install dist/*.whl

    - name: Run tests
      run: |
        # Move source out of the way so we test the installed package
        mkdir _ignore
        mv rao_algorithms _ignore/
        pytest tests/
        # Move it back for subsequent steps if any
        mv _ignore/rao_algorithms .
